<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c8401a">
<title>ChronoVoix — Suivi du temps</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f0e0c;
    --paper: #f5f0e8;
    --cream: #ede6d6;
    --accent: #c8401a;
    --accent2: #2a6b4f;
    --gold: #c9933a;
    --muted: #8a7e6e;
    --line: #d4cabb;
    --white: #faf8f4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(200,64,26,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(42,107,79,0.06) 0%, transparent 50%);
  }
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--accent);
  }
  .logo { font-family: 'DM Serif Display', serif; font-size: 1.4rem; }
  .logo span { color: var(--accent); font-style: italic; }
  .header-date { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); }
  nav {
    display: flex; gap: 4px; padding: 10px 16px;
    background: var(--cream); border-bottom: 1px solid var(--line);
  }
  .tab {
    padding: 7px 16px; border-radius: 4px; border: none;
    background: transparent; font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem; font-weight: 500; color: var(--muted); cursor: pointer;
  }
  .tab.active { background: var(--ink); color: var(--paper); }
  .page { display: none; padding: 20px 16px; max-width: 860px; margin: 0 auto; }
  .page.active { display: block; }
  .card {
    background: var(--white); border: 1px solid var(--line);
    border-radius: 12px; padding: 20px; margin-bottom: 18px;
    box-shadow: 0 2px 12px rgba(15,14,12,0.06);
  }
  .hint-box {
    background: rgba(42,107,79,0.07); border-left: 3px solid var(--accent2);
    border-radius: 0 8px 8px 0; padding: 10px 14px;
    font-size: 0.8rem; color: var(--accent2); margin-bottom: 16px; line-height: 1.6;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-row.thirds { grid-template-columns: 1fr 1fr 1fr; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 0.72rem; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .field input, .field select, .field textarea {
    padding: 9px 12px; border: 1px solid var(--line); border-radius: 6px;
    background: var(--paper); font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem; color: var(--ink);
  }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
  .field textarea { min-height: 64px; resize: vertical; }
  .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px; }
  .btn { padding: 9px 20px; border: none; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500; cursor: pointer; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-secondary { background: var(--cream); color: var(--ink); border: 1px solid var(--line); }
  .section-title {
    font-family: 'DM Serif Display', serif; font-size: 1.1rem;
    margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
    padding-bottom: 8px; border-bottom: 1px solid var(--line);
  }
  .badge {
    font-family: 'DM Mono', monospace; font-size: 0.68rem;
    background: var(--ink); color: var(--paper); padding: 2px 8px; border-radius: 20px;
  }
  .entry-item {
    background: var(--white); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
  }
  .entry-client { background: var(--ink); color: var(--paper); font-size: 0.72rem; font-weight: 500; padding: 2px 9px; border-radius: 20px; white-space: nowrap; }
  .entry-hours { font-family: 'DM Serif Display', serif; font-size: 1.05rem; color: var(--accent); min-width: 44px; }
  .entry-desc { flex: 1; font-size: 0.82rem; color: var(--ink); }
  .entry-del { background: none; border: none; cursor: pointer; color: var(--line); font-size: 0.95rem; padding: 3px; }
  .entry-del:hover { color: var(--accent); }
  .day-total { text-align: right; font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--muted); margin-top: 8px; }
  .day-total strong { color: var(--accent); font-size: 0.95rem; }
  .month-selector { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .month-selector select { padding: 8px 14px; border: 1px solid var(--line); border-radius: 6px; background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--ink); }
  .month-selector button { padding: 8px 16px; color: white; border: none; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; cursor: pointer; }
  .btn-csv { background: var(--accent2); }
  .btn-pdf { background: #7b2d8b; }
  .rapport-summary {
    background: var(--ink); color: var(--paper); border-radius: 12px;
    padding: 16px 20px; margin-bottom: 18px; display: flex; gap: 24px; flex-wrap: wrap;
  }
  .sum-item { display: flex; flex-direction: column; gap: 3px; }
  .sum-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .sum-value { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--gold); }
  .client-block { background: var(--white); border: 1px solid var(--line); border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
  .client-header { background: var(--ink); color: var(--paper); padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; }
  .client-header h3 { font-family: 'DM Serif Display', serif; font-size: 1rem; }
  .client-total { font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--gold); }
  .client-entry-row { display: grid; grid-template-columns: 80px 50px 1fr; gap: 10px; padding: 10px 18px; border-bottom: 1px solid var(--line); font-size: 0.82rem; align-items: center; }
  .client-entry-row:last-child { border-bottom: none; }
  .client-entry-row:nth-child(even) { background: var(--paper); }
  .col-date { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); }
  .col-h { font-family: 'DM Serif Display', serif; color: var(--accent); }
  .client-manage-item { background: var(--paper); border: 1px solid var(--line); border-radius: 8px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .client-manage-item button { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 0.95rem; }
  .add-client-row { display: flex; gap: 8px; margin-top: 10px; }
  .add-client-row input { flex: 1; padding: 9px 12px; border: 1px solid var(--line); border-radius: 6px; background: var(--paper); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
  .voice-btn-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; margin-bottom: 20px; }
  #voiceBtn {
    width: 88px; height: 88px; border-radius: 50%;
    border: 3px solid var(--accent); background: var(--white); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(200,64,26,0.15); transition: all 0.25s;
  }
  #voiceBtn.listening { background: var(--accent); animation: pulse 1.4s infinite; }
  #voiceBtn.listening svg path { fill: white; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(200,64,26,0.4); }
    50% { box-shadow: 0 0 0 14px rgba(200,64,26,0); }
  }
  .voice-status { font-size: 0.75rem; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; }
  .voice-status.active { color: var(--accent); }
  #transcript {
    background: var(--paper); border: 1px dashed var(--line); border-radius: 8px;
    padding: 14px; min-height: 54px; font-family: 'DM Mono', monospace;
    font-size: 0.88rem; color: var(--ink); margin-bottom: 16px; line-height: 1.6;
  }
  #transcript.placeholder { color: var(--muted); font-style: italic; }
  @media print {
    header, nav, .month-selector { display: none !important; }
    body { background: white !important; }
    #tab-saisie, #tab-clients { display: none !important; }
    #tab-rapport { display: block !important; padding: 0 !important; }
    .client-header { background: #0f0e0c !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .rapport-summary { background: #f0f0f0 !important; -webkit-print-color-adjust: exact; }
    .client-block { break-inside: avoid; }
  }
  @media (max-width: 500px) {
    .form-row, .form-row.thirds { grid-template-columns: 1fr; }
    .rapport-summary { gap: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Chrono<span>Voix</span></div>
  <div class="header-date" id="headerDate"></div>
</header>

<nav>
  <button class="tab active" onclick="showTab('saisie',this)">🎙 Saisie</button>
  <button class="tab" onclick="showTab('rapport',this)">📊 Rapport</button>
  <button class="tab" onclick="showTab('clients',this)">👥 Clients</button>
</nav>

<!-- SAISIE -->
<div class="page active" id="tab-saisie">
  <div class="card">
    <div class="voice-btn-wrap">
      <button id="voiceBtn" onclick="toggleVoice()" title="Dicter">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none">
          <path d="M12 1C10.34 1 9 2.34 9 4V12C9 13.66 10.34 15 12 15C13.66 15 15 13.66 15 12V4C15 2.34 13.66 1 12 1ZM19 12C19 15.87 15.87 19 12 19C8.13 19 5 15.87 5 12H3C3 16.97 6.93 21.07 11.9 21.48V23H13.1V21.48C18.07 21.07 22 16.97 22 12H19Z" fill="#c8401a"/>
        </svg>
      </button>
      <div class="voice-status" id="voiceStatus">Appuyer pour dicter</div>
    </div>
    <div id="transcript" class="placeholder">Votre texte dicté apparaîtra ici…</div>
    <div class="hint-box">
      <strong>💡 Dites par exemple :</strong><br>
      « <em>Client Dupont, deux heures trente, réunion de suivi</em> »
    </div>
    <div class="form-row thirds">
      <div class="field">
        <label>Client</label>
        <select id="fieldClient"><option value="">— Choisir —</option></select>
      </div>
      <div class="field">
        <label>Heures</label>
        <input type="number" id="fieldHours" step="0.25" min="0.25" max="24" placeholder="ex: 1.5">
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" id="fieldDate">
      </div>
    </div>
    <div class="field" style="margin-bottom:12px">
      <label>Description</label>
      <textarea id="fieldDesc" placeholder="Tâche effectuée…"></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="clearForm()">Effacer</button>
      <button class="btn btn-primary" onclick="saveEntry()">✓ Enregistrer</button>
    </div>
  </div>

  <div class="section-title">
    Aujourd'hui
    <span class="badge" id="todayCount">0 entrée</span>
    <span style="margin-left:auto;font-family:monospace;font-size:0.75rem;color:var(--accent)" id="dayTotalBadge"></span>
  </div>
  <div id="entryList">
    <div class="empty-state"><div class="icon">📋</div><p>Aucune entrée pour aujourd'hui</p></div>
  </div>
  <div class="day-total" id="dayTotal"></div>
</div>

<!-- RAPPORT -->
<div class="page" id="tab-rapport">
  <div class="month-selector">
    <select id="monthSelect"></select>
    <button class="btn-csv" onclick="exportCSV()">⬇ CSV</button>
    <button class="btn-pdf" onclick="exportPDF()">⬇ PDF</button>
  </div>
  <div id="reportContent"></div>
</div>

<!-- CLIENTS -->
<div class="page" id="tab-clients">
  <div class="card">
    <div class="section-title">Mes clients <span class="badge" id="clientCount">0</span></div>
    <div id="clientListManage"></div>
    <div class="add-client-row">
      <input type="text" id="newClientInput" placeholder="Nom du nouveau client…" onkeydown="if(event.key==='Enter')addClient()">
      <button class="btn btn-primary" onclick="addClient()">+ Ajouter</button>
    </div>
  </div>
</div>

<script>
let entries = JSON.parse(localStorage.getItem('cv_entries') || '[]');
let clients = JSON.parse(localStorage.getItem('cv_clients') || '["Dupont","Martin","Durand"]');

function save() {
  localStorage.setItem('cv_entries', JSON.stringify(entries));
  localStorage.setItem('cv_clients', JSON.stringify(clients));
}

function toISO(d) { return d.toISOString().split('T')[0]; }

function init() {
  const now = new Date();
  document.getElementById('headerDate').textContent = now.toLocaleDateString('fr-FR', {weekday:'short',day:'numeric',month:'short'});
  document.getElementById('fieldDate').value = toISO(now);
  populateMonthSelect();
  renderClients();
  renderToday();
  renderClientDropdown();
}

function showTab(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'rapport') genReport();
}

// VOICE
let recognition = null;
let isListening = false;

function toggleVoice() {
  if (!isListening) startListening(); else stopListening();
}

function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Reconnaissance vocale non disponible. Utilisez le micro de votre clavier.'); return; }
  recognition = new SR();
  recognition.lang = 'fr-FR';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.onresult = (e) => {
    const t = Array.from(e.results).map(r => r[0].transcript).join('');
    const el = document.getElementById('transcript');
    el.textContent = t;
    el.classList.remove('placeholder');
    if (e.results[e.results.length-1].isFinal) parseVoice(t);
  };
  recognition.onend = () => stopListening();
  recognition.onerror = () => stopListening();
  recognition.start();
  isListening = true;
  document.getElementById('voiceBtn').classList.add('listening');
  document.getElementById('voiceStatus').textContent = '● En écoute…';
  document.getElementById('voiceStatus').classList.add('active');
}

function stopListening() {
  if (recognition) { try { recognition.stop(); } catch(e){} }
  isListening = false;
  document.getElementById('voiceBtn').classList.remove('listening');
  document.getElementById('voiceStatus').textContent = 'Appuyer pour dicter';
  document.getElementById('voiceStatus').classList.remove('active');
}

const NUM_WORDS = {'un':1,'une':1,'deux':2,'trois':3,'quatre':4,'cinq':5,'six':6,'sept':7,'huit':8,'neuf':9,'dix':10,'onze':11,'douze':12};

function parseVoice(text) {
  const lower = text.toLowerCase();
  let foundClient = '';
  for (const c of clients) {
    if (lower.includes(c.toLowerCase())) { foundClient = c; break; }
  }
  let hours = 0;
  let m = lower.match(/(\d+)[h:](\d{2})/);
  if (m) hours = parseInt(m[1]) + parseInt(m[2])/60;
  else {
    m = lower.match(/(\d+[.,]\d+)\s*heure/);
    if (m) hours = parseFloat(m[1].replace(',','.'));
    else { m = lower.match(/(\d+)\s*heure/); if (m) hours = parseInt(m[1]); }
  }
  if (!hours) for (const [w,v] of Object.entries(NUM_WORDS)) {
    if (new RegExp('\\b'+w+'\\b.{0,15}heure','i').test(lower)) { hours = v; break; }
  }
  if (lower.includes('demi')) hours += 0.5;
  if (lower.includes('trois quart')) hours += 0.75;
  else if (lower.includes('quart')) hours += 0.25;

  let desc = text;
  if (foundClient) desc = desc.replace(new RegExp(foundClient,'gi'),'');
  desc = desc.replace(/client\s*/gi,'').replace(/\d+[h:]\d{2}/g,'')
    .replace(/\d+[.,]\d+\s*heure[s]?/gi,'')
    .replace(/\b(un|une|deux|trois|quatre|cinq|six|sept|huit|neuf|dix|onze|douze)\b\s*heure[s]?/gi,'')
    .replace(/trois\s*quarts?\s*(d.heure)?/gi,'').replace(/demi[-\s]?heure/gi,'').replace(/\bquart\b/gi,'')
    .replace(/\s{2,}/g,' ').trim().replace(/^[,\s]+|[,\s]+$/g,'').trim();

  if (foundClient) document.getElementById('fieldClient').value = foundClient;
  if (hours > 0) document.getElementById('fieldHours').value = hours.toFixed(2);
  if (desc) document.getElementById('fieldDesc').value = desc;
}

// ENTRIES
function saveEntry() {
  const client = document.getElementById('fieldClient').value;
  const hours = parseFloat(document.getElementById('fieldHours').value);
  const date = document.getElementById('fieldDate').value;
  const desc = document.getElementById('fieldDesc').value.trim();
  if (!client) { alert('Veuillez sélectionner un client.'); return; }
  if (!hours || hours <= 0) { alert('Veuillez indiquer un nombre d\'heures valide.'); return; }
  if (!date) { alert('Veuillez indiquer une date.'); return; }
  entries.push({ id: Date.now(), client, hours, date, desc, createdAt: new Date().toISOString() });
  save();
  clearForm();
  renderToday();
  const t = document.getElementById('transcript');
  t.textContent = 'Entrée enregistrée ✓';
  t.classList.remove('placeholder');
  setTimeout(() => { t.textContent = 'Votre texte dicté apparaîtra ici…'; t.classList.add('placeholder'); }, 2000);
}

function clearForm() {
  document.getElementById('fieldClient').value = '';
  document.getElementById('fieldHours').value = '';
  document.getElementById('fieldDesc').value = '';
  document.getElementById('fieldDate').value = toISO(new Date());
}

function deleteEntry(id) {
  if (!confirm('Supprimer cette entrée ?')) return;
  entries = entries.filter(e => e.id !== id);
  save();
  renderToday();
}

function formatH(h) {
  const hh = Math.floor(h);
  const mm = Math.round((h - hh) * 60);
  return mm ? hh+'h'+mm.toString().padStart(2,'0') : hh+'h';
}

function renderToday() {
  const today = toISO(new Date());
  const te = entries.filter(e => e.date === today);
  const list = document.getElementById('entryList');
  const count = document.getElementById('todayCount');
  const total = document.getElementById('dayTotal');
  const badge = document.getElementById('dayTotalBadge');
  count.textContent = te.length + (te.length > 1 ? ' entrées' : ' entrée');
  if (te.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>Aucune entrée pour aujourd\'hui</p></div>';
    total.innerHTML = ''; badge.textContent = ''; return;
  }
  list.innerHTML = te.slice().reverse().map(e => `
    <div class="entry-item">
      <span class="entry-client">${e.client}</span>
      <span class="entry-hours">${formatH(e.hours)}</span>
      <span class="entry-desc">${e.desc || '<em style="color:var(--muted)">—</em>'}</span>
      <button class="entry-del" onclick="deleteEntry(${e.id})">✕</button>
    </div>
  `).join('');
  const sum = te.reduce((a,e) => a+e.hours, 0);
  total.innerHTML = 'Total : <strong>'+formatH(sum)+'</strong>';
  badge.textContent = formatH(sum);
}

// RAPPORT
function populateMonthSelect() {
  const sel = document.getElementById('monthSelect');
  const now = new Date();
  for (let i = 0; i < 12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const val = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const label = d.toLocaleDateString('fr-FR', {month:'long', year:'numeric'});
    sel.innerHTML += '<option value="'+val+'"'+(i===0?' selected':'')+'>'+label.charAt(0).toUpperCase()+label.slice(1)+'</option>';
  }
}

function genReport() {
  const ym = document.getElementById('monthSelect').value;
  const [yr, mo] = ym.split('-').map(Number);
  const me = entries.filter(e => { const d = new Date(e.date); return d.getFullYear()===yr && d.getMonth()+1===mo; });
  const el = document.getElementById('reportContent');
  if (me.length === 0) { el.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Aucune entrée ce mois</p></div>'; return; }
  const byClient = {};
  for (const e of me) { if (!byClient[e.client]) byClient[e.client]=[]; byClient[e.client].push(e); }
  const totalH = me.reduce((a,e)=>a+e.hours,0);
  let html = '<div class="rapport-summary">'
    +'<div class="sum-item"><span class="sum-label">Total heures</span><span class="sum-value">'+formatH(totalH)+'</span></div>'
    +'<div class="sum-item"><span class="sum-label">Clients</span><span class="sum-value">'+Object.keys(byClient).length+'</span></div>'
    +'<div class="sum-item"><span class="sum-label">Entrées</span><span class="sum-value">'+me.length+'</span></div>'
    +'</div>';
  for (const [client, ces] of Object.entries(byClient)) {
    const ct = ces.reduce((a,e)=>a+e.hours,0);
    ces.sort((a,b)=>a.date.localeCompare(b.date));
    html += '<div class="client-block"><div class="client-header"><h3>'+client+'</h3><span class="client-total">'+formatH(ct)+'</span></div>';
    for (const e of ces) {
      html += '<div class="client-entry-row"><span class="col-date">'+new Date(e.date+'T12:00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})+'</span><span class="col-h">'+formatH(e.hours)+'</span><span>'+( e.desc||'—')+'</span></div>';
    }
    html += '</div>';
  }
  el.innerHTML = html;
}

function exportCSV() {
  const ym = document.getElementById('monthSelect').value;
  const [yr, mo] = ym.split('-').map(Number);
  const me = entries.filter(e => { const d = new Date(e.date); return d.getFullYear()===yr && d.getMonth()+1===mo; });
  if (me.length === 0) { alert('Aucune donnée pour ce mois.'); return; }
  const rows = [['Date','Client','Heures','Description']];
  me.sort((a,b)=>a.date.localeCompare(b.date)).forEach(e => rows.push([e.date, e.client, e.hours.toFixed(2), e.desc]));
  const csv = rows.map(r => r.map(c => '"'+String(c).replace(/"/g,'""')+'"').join(';')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'rapport_'+ym+'.csv'; a.click();
}

function exportPDF() {
  const ym = document.getElementById('monthSelect').value;
  const [yr, mo] = ym.split('-').map(Number);
  const me = entries.filter(e => { const d = new Date(e.date); return d.getFullYear()===yr && d.getMonth()+1===mo; });
  if (me.length === 0) { alert('Aucune donnée pour ce mois.'); return; }
  genReport();
  setTimeout(() => window.print(), 300);
}

// CLIENTS
function renderClients() {
  const el = document.getElementById('clientListManage');
  document.getElementById('clientCount').textContent = clients.length;
  if (clients.length === 0) { el.innerHTML = '<p style="color:var(--muted);font-size:0.85rem;padding:8px 0;">Aucun client.</p>'; return; }
  el.innerHTML = clients.map((c,i) => '<div class="client-manage-item"><span>'+c+'</span><button onclick="deleteClient('+i+')" title="Supprimer">✕</button></div>').join('');
  renderClientDropdown();
}

function renderClientDropdown() {
  const sel = document.getElementById('fieldClient');
  const cur = sel.value;
  sel.innerHTML = '<option value="">— Choisir —</option>';
  clients.forEach(c => { const o = document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });
  if (cur) sel.value = cur;
}

function addClient() {
  const input = document.getElementById('newClientInput');
  const name = input.value.trim();
  if (!name) return;
  if (clients.includes(name)) { alert('Ce client existe déjà.'); return; }
  clients.push(name);
  save();
  input.value = '';
  renderClients();
}

function deleteClient(i) {
  if (!confirm('Supprimer "'+clients[i]+'" ?')) return;
  clients.splice(i, 1);
  save();
  renderClients();
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
